<section>

<h3 class="font-headline text-lg font-semibold text-on-surface mb-6 flex items-center gap-2">

<span class="material-symbols-outlined text-primary text-xl">info</span>

<div class="grid grid-cols-2 gap-x-8 gap-y-6">

<!-- Variant Name -->

<div class="col-span-2">

<label class="block text-sm font-label text-on-surface-variant mb-2 flex items-center gap-1">

                                Variant Name <span class="text-error-dim">*</span>

</label>

<input class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-outline-variant/60 focus:ring-1 focus:ring-surface-bright transition-all shadow-inner" type="text" value="Front Brake Pads Set"/>

</div>

<!-- Part Number -->

<div>

<label class="block text-sm font-label text-on-surface-variant mb-2 flex items-center gap-1">

</label>

<input class="w-full bg-surface-container-low border border-outline-variant/20 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:border-outline-variant/60 focus:ring-1 focus:ring-surface-bright transition-all shadow-inner" type="text" value="NGN-BPS-772"/>

</div>

</div>

<p class="text-xs font-label text-on-surface-variant/70 mt-1.5">Original Equipment Manufacturer code</p>

</div>

</div>

</section>

<span class="material-symbols-outlined text-primary text-xl">directions_car</span>

<!-- Make -->

<div>

<label class="block text-sm font-label text-on-surface-variant mb-2 flex items-center gap-1">
